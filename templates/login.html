<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAFT | Secure Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="login-body">

  <!-- Animated background grid -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="login-container">
    <!-- Logo / Brand -->
    <div class="login-brand">
      <div class="brand-icon">
        <i class="fas fa-shield-halved"></i>
      </div>
      <h1 class="brand-name">DAFT</h1>
      <p class="brand-sub">Digital &nbsp;·&nbsp; Forensics &nbsp;·&nbsp; AI &nbsp;·&nbsp; Toolkit</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-card-header">
        <span class="terminal-dot red"></span>
        <span class="terminal-dot yellow"></span>
        <span class="terminal-dot green"></span>
        <span class="terminal-title">SECURE_ACCESS.exe</span>
      </div>

      <div class="login-card-body">
        {% if error %}
        <div class="alert-box">
          <i class="fas fa-triangle-exclamation"></i>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/" id="loginForm">
          <div class="input-group">
            <label for="username">
              <i class="fas fa-user-shield"></i> USERNAME
            </label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
            <span class="input-underline"></span>
          </div>

          <div class="input-group">
            <label for="password">
              <i class="fas fa-lock"></i> PASSWORD
            </label>
            <div class="pw-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••••••"
                autocomplete="current-password"
                required
              />
              <button type="button" class="pw-toggle" onclick="togglePw()">
                <i class="fas fa-eye" id="eyeIcon"></i>
              </button>
            </div>
            <span class="input-underline"></span>
          </div>

          <button type="submit" class="login-btn" id="loginBtn">
            <span class="btn-text">
              <i class="fas fa-terminal"></i> AUTHENTICATE
            </span>
            <span class="btn-glow"></span>
          </button>
        </form>

        <div class="demo-creds">
          <p><i class="fas fa-circle-info"></i> Demo credentials</p>
          <code>admin / forensics2024</code>
          <code>analyst / analyst123</code>
        </div>
      </div>
    </div>

    <p class="login-footer">
      <i class="fas fa-lock-keyhole"></i>
      Encrypted Session &nbsp;|&nbsp; All activity logged &nbsp;|&nbsp; v2.4.1
    </p>
  </div>

  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
